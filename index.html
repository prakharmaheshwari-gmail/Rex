<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Real Estate Exchange</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-200 flex items-center justify-center min-h-screen p-4">

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // 🔴 IMPORTANT: CHANGE THIS TO YOUR LIVE RENDER.COM URL AFTER DEPLOYING THE BACKEND
    const BACKEND_URL = 'http://localhost:3000/api'; 
    
    const ALL_CITIES = ['Indore', 'Mumbai', 'Bharuch', 'Ujjain', 'Jaipur', 'Varanasi', 'Surat', 'Bhopal'];
    const MAX_PROPERTY_SUPPLY = 100000; 

    function App() {
        const [activeTab, setActiveTab] = useState('Market');
        const [isLoading, setIsLoading] = useState(true);
        
        // State is now driven entirely by the backend
        const [balance, setBalance] = useState(0);
        const [portfolio, setPortfolio] = useState({}); 
        const [logs, setLogs] = useState([]);
        const [marketData, setMarketData] = useState([]);

        const [ipAddress, setIpAddress] = useState('Fetching IP...');
        const [deviceId, setDeviceId] = useState('');
        const [activeCity, setActiveCity] = useState('Indore');

        const [selectedProperty, setSelectedProperty] = useState(null);
        const [tradeType, setTradeType] = useState('BUY'); 
        const [tradeQty, setTradeQty] = useState(0);

        // --- 1. THE LOBOTOMY: FETCHING GLOBAL STATE ---
        const fetchGlobalState = async (id) => {
            try {
                const response = await fetch(`${BACKEND_URL}/sync`, {
                    method: 'POST',
                    headers: { 'X-Device-Id': id }
                });
                const data = await response.json();
                
                setBalance(data.balance);
                setMarketData(data.market.map(p => ({
                    ...p, 
                    bid: Math.floor(p.base_price * 0.99), 
                    ask: Math.ceil(p.base_price * 1.01)
                })));
                
                // Convert DB portfolio array back to quick-lookup object
                const portObj = {};
                data.portfolio.forEach(item => {
                    portObj[item.property_id] = { qty: item.qty, entryPrice: item.entry_price };
                });
                setPortfolio(portObj);
                setLogs(data.logs);
                setIsLoading(false);
            } catch (err) {
                console.error("Failed to connect to backend", err);
            }
        };

        useEffect(() => {
            fetch('https://ipapi.co/json/')
                .then(res => res.json())
                .then(data => {
                    setIpAddress(data.ip || 'Unknown');
                    if (ALL_CITIES.includes(data.city)) setActiveCity(data.city);
                }).catch(() => setIpAddress('Network Offline'));

            const storedId = localStorage.getItem('nrex_global_uuid');
            let currentId = storedId;
            if (!storedId) {
                currentId = 'AND-' + Math.random().toString(36).substring(2, 15).toUpperCase();
                localStorage.setItem('nrex_global_uuid', currentId);
            }
            setDeviceId(currentId);
            
            // Initial sync with backend
            fetchGlobalState(currentId);
            
            // Poll for market updates every 5 seconds (Poor man's WebSockets for now)
            const interval = setInterval(() => fetchGlobalState(currentId), 5000);
            return () => clearInterval(interval);
        }, []);

        const netWorth = useMemo(() => {
            let nw = balance;
            Object.keys(portfolio).forEach(id => {
                const prop = marketData.find(p => p.id == id);
                if (!prop) return; 
                const pos = portfolio[id];
                if (pos.qty > 0) nw += (pos.qty * prop.bid); 
                else if (pos.qty < 0) nw += ((pos.entryPrice * Math.abs(pos.qty)) + ((pos.entryPrice - prop.ask) * Math.abs(pos.qty)));
            });
            return nw;
        }, [balance, portfolio, marketData]);

        const totalUnrealizedPnl = useMemo(() => {
            let total = 0;
            Object.keys(portfolio).forEach(id => {
                const prop = marketData.find(p => p.id == id);
                if (!prop) return;
                const pos = portfolio[id];
                const isShort = pos.qty < 0;
                const absQty = Math.abs(pos.qty);
                total += isShort ? (pos.entryPrice - prop.ask) * absQty : (prop.bid - pos.entryPrice) * absQty;
            });
            return total;
        }, [portfolio, marketData]);

        const totalRealizedPnl = useMemo(() => logs.reduce((sum, log) => sum + (log.pnl || 0), 0), [logs]);

        // --- 2. THE LOBOTOMY: SENDING TRADES TO THE SERVER ---
        const executeTrade = async () => {
            if (!selectedProperty || tradeQty <= 0) return;
            
            const position = portfolio[selectedProperty.id] || { qty: 0, entryPrice: 0 };
            const isClosing = (tradeType === 'BUY' && position.qty < 0) || (tradeType === 'SELL' && position.qty > 0);
            
            if (isClosing) {
                const executionPrice = tradeType === 'BUY' ? selectedProperty.ask : selectedProperty.bid;
                let pnl = 0;
                if (tradeType === 'SELL') { // Closing a Long
                    pnl = (executionPrice - position.entryPrice) * tradeQty;
                } else { // Closing a Short
                    pnl = (position.entryPrice - executionPrice) * tradeQty;
                }
                
                if (pnl < 0) {
                    const proceed = window.confirm(`WARNING: Closing this position will realize a loss of ${Math.abs(pnl).toLocaleString()} pts.\n\nAre you sure you want to proceed?`);
                    if (!proceed) return;
                }
            }

            try {
                // Send intent to Backend
                const response = await fetch(`${BACKEND_URL}/trade`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Device-Id': deviceId },
                    body: JSON.stringify({ propertyId: selectedProperty.id, tradeType: tradeType, tradeQty: tradeQty })
                });

                const result = await response.json();
                
                if (result.error) {
                    alert(result.error);
                } else {
                    // Success! Fetch new global state to update UI
                    fetchGlobalState(deviceId);
                    closeSheet();
                }
            } catch (err) {
                alert("Network connection to exchange failed.");
            }
        };

        const closeSheet = () => { setSelectedProperty(null); setTradeQty(0); };

        if (isLoading) return <div className="text-center mt-20 font-bold">Connecting to Exchange...</div>;

        // ... [The rest of the UI rendering remains identical to the previous version] ...
        
        // (For brevity in this snippet, insert the full return() UI block here from the previous code)
        return ( <div className="w-full max-w-[400px] h-[800px] bg-gray-50 rounded-[3rem] shadow-2xl border-[8px] border-gray-900 overflow-hidden relative flex flex-col font-sans text-gray-800">
             <div className="w-full h-7 bg-gray-900 flex justify-between items-center px-6 text-xs text-white shrink-0">
                    <span>9:41</span>
                    <div className="flex gap-2">
                        <i className="fas fa-signal"></i>
                        <i className="fas fa-wifi"></i>
                        <i className="fas fa-battery-full"></i>
                    </div>
                </div>

                <div className="w-full bg-gray-800 text-center py-1 shrink-0 border-t border-gray-700">
                    <p className="text-[10px] text-gray-300 font-mono tracking-widest uppercase">
                        Location IP: <span className="text-white font-bold">{ipAddress}</span>
                    </p>
                </div>
            <div className="flex-1 overflow-y-auto pb-[90px] p-4 text-center mt-10">
                <h1 className="text-2xl font-bold">Market Connected</h1>
                <p className="text-gray-500 mt-2">Replace this block with the full UI code from the previous step.</p>
            </div>
        </div>);
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
